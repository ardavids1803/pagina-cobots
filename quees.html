<section>
<p>
Un cobot (robot colaborativo) es un tipo de robot diseñado para trabajar junto a los humanos de manera segura, sin necesidad de barreras o jaulas.
</p>

<h2>Relación con IA</h2>
<p>
Reconocen objetos, aprenden tareas, se adaptan y toman decisiones.
</p>
